      function getTranslation(key, lang) {
        const keys = key.split('.');
        let result = translations[lang];
        for (const k of keys) {
          result = result?.[k];
          if (result === undefined) {
            let fallbackResult = translations['de']; // Default to German for fallback
            for (const fk of keys) {
                fallbackResult = fallbackResult?.[fk];
            }
            return fallbackResult || key;
          }
        }
        return result || key;
      }

      function setLanguage(lang) {
        const buttons = document.querySelectorAll('.language-button');
        buttons.forEach(button => {
          button.classList.remove('ring-2', 'ring-amber-500', 'ring-offset-2', 'ring-offset-gray-900');
          if (button.dataset.lang === lang) {
            button.classList.add('ring-2', 'ring-amber-500', 'ring-offset-2', 'ring-offset-gray-900');
          }
        });

        const elementsToTranslate = document.querySelectorAll('[data-translate-key]');
        elementsToTranslate.forEach(el => {
          const key = el.dataset.translateKey;
          const translation = getTranslation(key, lang);
          el.innerText = translation;
        });

        document.documentElement.lang = lang;
        
        // Persist language choice
        try {
            localStorage.setItem('preferredLanguage', lang);
        } catch(e) {}
      }

      document.addEventListener('DOMContentLoaded', () => {
        const buttons = document.querySelectorAll('.language-button');
        buttons.forEach(button => {
          button.addEventListener('click', () => {
            setLanguage(button.dataset.lang);
          });
        });

        // Load saved language or default to German
        let savedLang = 'de';
        try {
            savedLang = localStorage.getItem('preferredLanguage') || 'de';
        } catch(e) {}
        
        setLanguage(savedLang);
      });
    </script>
